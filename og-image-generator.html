<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flo — og:image Generator (1200×630)</title>
<style>
  body{margin:0;background:#222;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;font-family:sans-serif;}
  canvas{box-shadow:0 20px 60px rgba(0,0,0,0.6);}
  .btn{background:#7c6dfa;color:#fff;border:none;padding:14px 36px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}
  .btn:hover{background:#9580ff;}
  p{color:#666;font-size:12px;margin:0;}
</style>
</head>
<body>
<canvas id="c" width="1200" height="630"></canvas>
<button class="btn" onclick="download()">⬇ Save as og-image.png</button>
<p>After saving, add this file to your flo-app repo root and push to GitHub</p>

<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=1200,H=630;

// Background
ctx.fillStyle='#07070f'; ctx.fillRect(0,0,W,H);

// Grid
ctx.strokeStyle='rgba(124,109,250,0.04)'; ctx.lineWidth=1;
for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
for(let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

// Glow top-left
const glow=ctx.createRadialGradient(200,200,0,200,200,400);
glow.addColorStop(0,'rgba(124,109,250,0.1)');
glow.addColorStop(1,'rgba(0,0,0,0)');
ctx.fillStyle=glow; ctx.fillRect(0,0,W,H);

// Right side — candlestick chart (subtle, decorative)
ctx.save(); ctx.globalAlpha=0.1;
const bars=[
  {x:730,h:80,up:true},{x:790,h:60,up:false},{x:850,h:100,up:true},
  {x:910,h:140,up:true},{x:970,h:90,up:false},{x:1030,h:160,up:true},
  {x:1090,h:120,up:true},{x:1150,h:180,up:true},
];
bars.forEach(({x,h,up})=>{
  ctx.fillStyle=up?'#7c6dfa':'#a855f7';
  ctx.fillRect(x,H-60-h,32,h);
  // wick
  ctx.fillRect(x+14,H-60-h-20,4,20);
  ctx.fillRect(x+14,H-60,4,15);
});
ctx.restore();

// Line chart overlay (subtle)
ctx.save(); ctx.globalAlpha=0.08;
ctx.strokeStyle='#22c55e'; ctx.lineWidth=3; ctx.lineJoin='round';
ctx.beginPath();
const pts=[[720,500],[780,460],[840,430],[900,380],[960,400],[1020,320],[1080,290],[1140,240],[1200,200]];
ctx.moveTo(pts[0][0],pts[0][1]);
pts.slice(1).forEach(([x,y])=>ctx.lineTo(x,y));
ctx.stroke();
ctx.restore();

// Left accent bar
const bar=ctx.createLinearGradient(0,80,0,560);
bar.addColorStop(0,'rgba(124,109,250,0)');
bar.addColorStop(0.3,'rgba(124,109,250,0.9)');
bar.addColorStop(0.7,'rgba(168,85,247,0.9)');
bar.addColorStop(1,'rgba(168,85,247,0)');
ctx.fillStyle=bar; ctx.fillRect(72,80,4,460);

// "Flo" wordmark
ctx.save();
ctx.shadowColor='rgba(124,109,250,0.5)'; ctx.shadowBlur=50;
const fg=ctx.createLinearGradient(96,90,420,280);
fg.addColorStop(0,'#c4b5fd'); fg.addColorStop(0.5,'#7c6dfa'); fg.addColorStop(1,'#a855f7');
ctx.fillStyle=fg;
ctx.font='bold 170px Georgia,serif';
ctx.textBaseline='top';
ctx.fillText('Flo',96,88);
ctx.restore();

// Main headline
ctx.fillStyle='rgba(240,240,255,0.95)';
ctx.font='bold 42px "Helvetica Neue",Arial,sans-serif';
ctx.textBaseline='top'; ctx.textAlign='left';
ctx.fillText('Finance tools that respect your privacy',96,298);

// Sub-line
ctx.fillStyle='rgba(119,119,170,0.85)';
ctx.font='400 22px "Helvetica Neue",Arial,sans-serif';
ctx.fillText('Track your money. Keep your privacy. Works entirely in your browser.',96,358);

// Pills
const pills=[
  {label:'No Login',     color:'#7c6dfa', bg:'rgba(124,109,250,0.12)', border:'rgba(124,109,250,0.35)'},
  {label:'No Ads',       color:'#a855f7', bg:'rgba(168,85,247,0.12)',  border:'rgba(168,85,247,0.35)'},
  {label:'No Sync',      color:'#22c55e', bg:'rgba(34,197,94,0.12)',   border:'rgba(34,197,94,0.35)'},
  {label:'Free to Start',color:'#f59e0b', bg:'rgba(245,158,11,0.12)',  border:'rgba(245,158,11,0.35)'},
];
let px=96;
pills.forEach(({label,color,bg,border})=>{
  const pad=20, ph=44;
  ctx.font='bold 16px "Helvetica Neue",Arial,sans-serif';
  const tw=ctx.measureText(label).width;
  const pw=tw+pad*2;
  ctx.fillStyle=bg; roundRect(ctx,px,428,pw,ph,10); ctx.fill();
  ctx.strokeStyle=border; ctx.lineWidth=1.5; roundRect(ctx,px,428,pw,ph,10); ctx.stroke();
  ctx.fillStyle=color; ctx.textBaseline='middle'; ctx.textAlign='left';
  ctx.fillText(label,px+pad,428+ph/2);
  px+=pw+12;
});

// Bottom divider
ctx.strokeStyle='rgba(255,255,255,0.07)'; ctx.lineWidth=1;
ctx.beginPath(); ctx.moveTo(96,520); ctx.lineTo(W-72,520); ctx.stroke();

// URL
ctx.fillStyle='rgba(124,109,250,0.8)';
ctx.font='bold 20px "Helvetica Neue",Arial,sans-serif';
ctx.textBaseline='bottom'; ctx.textAlign='left';
ctx.fillText('flo.tota-finance.com',96,H-32);

// Handle
ctx.fillStyle='rgba(71,85,105,0.6)';
ctx.font='400 14px "Helvetica Neue",Arial,sans-serif';
ctx.textAlign='right';
ctx.fillText('@TotaFinanceHQ',W-72,H-34);

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function download(){
  const a=document.createElement('a');
  a.download='og-image.png';
  a.href=cv.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
